- date: "2026.06.29"
  text: "Awarded the <a href='https://www.chinapostdoctor.org.cn/article?inid=c1c008e3-1564-4ef8-a1be-b236a134ea5b&catid=8c892b1c-4ade-4a5f-9a87-5e736cb5e9f9' target='_blank'>China Postdoctoral Science Foundation Special Grant (19th Batch)</a> for the project 'Formation Mechanisms and Conversion Efficiency of Regenerated Rare Earth Resource Supply'."

- date: "2026.06.01"
  text: "Awarded the <a href='https://sklam.ustb.edu.cn/tzgg2/8137b04f2be94e5a911737c39796c7ca.htm' target='_blank'>Open Fund of the National Key Laboratory of Green and Low-Carbon Steel Metallurgy, University of Science and Technology Beijing</a> for the project 'Mechanisms and Techno-Economic Assessment of Maximum Emission Reduction through Oxygen-Hydrogen Coupled Blast Furnace Stock Retrofitting'."

- date: "2026.05.24"
  text: "Gave an oral presentation titled 'Material Flow Analysis and Demand Forecasting for Critical Metals' at <a href='https://mp.weixin.qq.com/s/buCfVSXdi0XTvGzxLPJvRg' target='_blank'>The 7th Workshop on Resource Security and Economic Sciences</a>, Xiamen University."

- date: "2026.04.25"
  text: "The research advance 'Methodological Innovation and Application Demonstration in Resource Economic Geography' was selected as one of the <a href='https://www.gsc.org.cn/gsc/zhiKuDetail.html?id=23&contentId=2352' target='_blank'>Top Ten Research Advances in Chinese Geographical Science 2025</a> by the Geographical Society of China, ranked 7/9."

- date: "2025.09"
  text: "Invited talk at Nanchang University on building metabolism and sustainability."
